---
# OpenSearch em produção — roda numa VM separada do cluster k8s
#
# Pré-requisito no host:
#   sudo sysctl -w vm.max_map_count=262144
#   echo "vm.max_map_count=262144" | sudo tee -a /etc/sysctl.conf
#
# Uso:
#   docker compose -f docker-compose.opensearch.yml up -d
#
# Variáveis (definir no .env ou exportar):
#   OPENSEARCH_PASSWORD  — senha do usuário admin

services:
  opensearch:
    image: opensearchproject/opensearch:2.9.0
    container_name: opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_PASSWORD}
      OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u admin:${OPENSEARCH_PASSWORD} http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  opensearch-data:
