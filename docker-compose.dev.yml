---
# Overrides e serviços exclusivos para desenvolvimento local
# Uso: docker compose -f docker-compose.yml -f docker-compose.traefik.yml -f docker-compose.dev.yml up -d
#
# O que este arquivo faz:
#   - Adiciona serviços locais: postgres, opensearch, minio (substituem serviços externos de prod)
#   - Sobrescreve configurações de prod para ambiente local (sem SSL, debug ativo, ports expostos)
#   - Sobrescreve o traefik para modo HTTP simples (sem Let's Encrypt)

networks:
  frontend:
    name: frontend
    # Em dev, criamos a rede localmente (não é external)
    external: false

services:
  api:
    environment:
      LOG_LEVEL: ${API_LOG_LEVEL:-DEBUG}
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      opensearch-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    labels:
      - "traefik.http.routers.querido-diario-api.rule=Host(`api.queridodiario.local`) || PathPrefix(`/api`)"
      - "traefik.http.routers.querido-diario-api.entrypoints=web"
      - "traefik.http.routers.querido-diario-api.tls=false"
      - "traefik.http.services.querido-diario-api.loadbalancer.server.port=8080"
    ports:
      - "${API_DEV_PORT:-8080}:8080"

  backend:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      QD_API_URL: http://api.queridodiario.local
      QD_BACKEND_DEBUG: ${QD_BACKEND_DEBUG:-True}
      QD_BACKEND_ALLOWED_HOSTS: "*"
      QD_BACKEND_ALLOWED_ORIGINS: http://localhost,http://localhost:4200,http://localhost:8000,http://localhost:8080,http://backend-api.queridodiario.local,http://api.queridodiario.local
      QD_BACKEND_ALLOWED_ORIGIN_REGEXES: "*"
      QD_BACKEND_CSRF_TRUSTED_ORIGINS: http://backend-api.queridodiario.local,http://localhost:8000
      QD_BACKEND_SECRET_KEY: ${QD_BACKEND_SECRET_KEY:-local-execution-django-secret-key}
      STATIC_URL: http://backend-api.queridodiario.local/api/static/
      FRONT_BASE_URL: ${FRONT_BASE_URL:-http://localhost:4200}
    labels:
      - "traefik.http.routers.querido-diario-backend.rule=Host(`backend-api.queridodiario.local`) || PathPrefix(`/backend`)"
      - "traefik.http.routers.querido-diario-backend.entrypoints=web"
      - "traefik.http.routers.querido-diario-backend.tls=false"
      - "traefik.http.services.querido-diario-backend.loadbalancer.server.port=8000"
    ports:
      - "${BACKEND_DEV_PORT:-8000}:8000"
    command: python manage.py runserver 0.0.0.0:8000

  celery-beat:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      QD_API_URL: http://api.queridodiario.local
      QD_BACKEND_DEBUG: ${QD_BACKEND_DEBUG:-True}
      QD_BACKEND_ALLOWED_HOSTS: "*"
      QD_BACKEND_SECRET_KEY: ${QD_BACKEND_SECRET_KEY:-local-execution-django-secret-key}
      FRONT_BASE_URL: ${FRONT_BASE_URL:-http://localhost:4200}

  celery-worker:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      QD_API_URL: http://api.queridodiario.local
      QD_BACKEND_DEBUG: ${QD_BACKEND_DEBUG:-True}
      QD_BACKEND_ALLOWED_HOSTS: "*"
      QD_BACKEND_SECRET_KEY: ${QD_BACKEND_SECRET_KEY:-local-execution-django-secret-key}
      FRONT_BASE_URL: ${FRONT_BASE_URL:-http://localhost:4200}

  data-processing:
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      apache-tika:
        condition: service_healthy
    environment:
      DEBUG: ${DEBUG:-1}
      EXECUTION_MODE: ${EXECUTION_MODE:-DEVELOPMENT}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minio-access-key}
      STORAGE_ACCESS_SECRET: ${STORAGE_ACCESS_SECRET:-minio-secret-key}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-queridodiariobucket}
      QUERIDO_DIARIO_FILES_ENDPOINT: ${QUERIDO_DIARIO_FILES_ENDPOINT:-http://minio:9000/queridodiariobucket/}
    restart: "no"

  redis:
    ports:
      - "${REDIS_DEV_PORT:-6378}:6378"

  apache-tika:
    ports:
      - "${APACHE_TIKA_DEV_PORT:-9998}:9998"

  # Traefik em modo dev: somente HTTP, sem SSL
  traefik:
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=frontend
      - --entrypoints.web.address=:80
      - --log.level=${TRAEFIK_LOG_LEVEL:-DEBUG}
      - --accesslog=true
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.cors-headers.headers.accessControlAllowMethods=GET,POST,OPTIONS,PUT,DELETE,PATCH"
      - "traefik.http.middlewares.cors-headers.headers.accessControlAllowOriginList=http://${DOMAIN:-queridodiario.local},http://localhost"
      - "traefik.http.middlewares.cors-headers.headers.accessControlAllowCredentials=true"
      - "traefik.http.middlewares.cors-headers.headers.accessControlMaxAge=3600"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.api-rate-limit.ratelimit.burst=500"
      - "traefik.http.middlewares.api-rate-limit.ratelimit.average=250"
      - "traefik.http.middlewares.api-rate-limit.ratelimit.period=1m"
      - "traefik.http.middlewares.compression.compress=true"
      - "traefik.http.middlewares.api-strip-prefix.stripprefix.prefixes=/api"
    environment:
      - TRAEFIK_LOG_LEVEL=${TRAEFIK_LOG_LEVEL:-DEBUG}

  # --- Serviços exclusivos de desenvolvimento (não existem em produção) ---

  postgres:
    image: postgres:13
    container_name: querido-diario-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${QD_DATA_DB_USER:-admin}
      POSTGRES_PASSWORD: ${QD_DATA_DB_PASSWORD:-admin}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QD_DATA_DB_USER:-admin}"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "${POSTGRES_DEV_PORT:-5432}:5432"

  opensearch:
    image: opensearchproject/opensearch:2.9.0
    container_name: querido-diario-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - plugins.security.ssl.http.enabled=false
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f -u admin:admin http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "${OPENSEARCH_DEV_PORT:-9200}:9200"

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: querido-diario-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minio-access-key}
      MINIO_ROOT_PASSWORD: ${STORAGE_ACCESS_SECRET:-minio-secret-key}
    volumes:
      - minio-data:/data
    networks:
      - backend
    command: ["server", "--console-address", ":9001", "/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "${MINIO_DEV_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_DEV_PORT:-9001}:9001"

  minio-createbucket:
    image: quay.io/minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    networks:
      - backend
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${STORAGE_ACCESS_KEY:-minio-access-key} ${STORAGE_ACCESS_SECRET:-minio-secret-key};
      /usr/bin/mc mb --ignore-existing local/${STORAGE_BUCKET:-queridodiariobucket};
      /usr/bin/mc anonymous set public local/${STORAGE_BUCKET:-queridodiariobucket};
      exit 0;
      "

  opensearch-init:
    image: curlimages/curl:latest
    container_name: querido-diario-opensearch-init
    depends_on:
      opensearch:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./init-scripts/opensearch/create-opensearch-index.sh:/create-index.sh:ro
    networks:
      - backend
    entrypoint: ["/bin/sh", "/create-index.sh"]
    environment:
      OPENSEARCH_HOST: http://opensearch:9200
      OPENSEARCH_USER: admin
      OPENSEARCH_PASSWORD: admin
      INDEX_NAME: ${QUERIDO_DIARIO_OPENSEARCH_INDEX:-querido-diario}

volumes:
  postgres-data:
    driver: local
  opensearch-data:
    driver: local
  minio-data:
    driver: local
