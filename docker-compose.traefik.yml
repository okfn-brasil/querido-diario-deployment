---
volumes:
  acme:

networks:
  default:
    name: frontend
    external: true

services:
  traefik:
    container_name: traefik
    image: "traefik:latest"
    restart: always
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --api.insecure=false
      - --api.dashboard=true
      - --metrics.prometheus=true
      - "--metrics.prometheus.buckets=0.1,0.3,1.2,5.0"
      - --providers.docker
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=frontend
      - --log.level=${TRAEFIK_LOG_LEVEL:-ERROR}
      - --certificatesresolvers.leresolver.acme.httpchallenge=true
      - --certificatesresolvers.leresolver.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.leresolver.acme.storage=/acme/acme.json
      - --certificatesresolvers.leresolver.acme.httpchallenge.entrypoint=web
    ports:
      - 80:80
      - 443:443
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - acme:/acme
    labels:
      - "traefik.enable=true"

      # Router específico para ACME challenges (HTTP apenas, sem redirect)
      - "traefik.http.routers.acme-challenge.rule=PathPrefix(`/.well-known/acme-challenge/`)"
      - "traefik.http.routers.acme-challenge.entrypoints=web"
      - "traefik.http.routers.acme-challenge.service=qd-frontend-www-noop"
      - "traefik.http.routers.acme-challenge.priority=999"

      # Redirecionamento HTTP -> HTTPS para todos os hosts (exceto ACME)
      - "traefik.http.routers.http-catchall.rule=PathPrefix(`/`) && !PathPrefix(`/.well-known/acme-challenge/`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.routers.http-catchall.service=qd-frontend-www-noop"
      - "traefik.http.routers.http-catchall.priority=1"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

      # Dashboard (protegido por basicauth)
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_DASHBOARD_DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=leresolver"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_USERS}"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"

      # CORS Headers
      - "traefik.http.middlewares.cors-headers.headers.accessControlAllowMethods=GET,POST,OPTIONS,PUT,DELETE,PATCH"
      - "traefik.http.middlewares.cors-headers.headers.accessControlAllowOriginList=${CORS_ALLOW_ORIGIN_LIST:-*}"
      - "traefik.http.middlewares.cors-headers.headers.accessControlAllowHeaders=Content-Type,Authorization,X-Requested-With,Accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers"
      - "traefik.http.middlewares.cors-headers.headers.accessControlAllowCredentials=true"
      - "traefik.http.middlewares.cors-headers.headers.accessControlMaxAge=3600"
      - "traefik.http.middlewares.cors-headers.headers.accessControlExposeHeaders=Content-Length,Content-Range"

      # Security Headers
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stsPreload=true"

      # API Rate Limiting
      - "traefik.http.middlewares.api-rate-limit.ratelimit.burst=50"
      - "traefik.http.middlewares.api-rate-limit.ratelimit.average=25"
      - "traefik.http.middlewares.api-rate-limit.ratelimit.period=1m"

      # Compression
      - "traefik.http.middlewares.compression.compress=true"

      # API Redirect - /api/* para api.domain
      - "traefik.http.middlewares.api-redirect.redirectregex.regex=^https?://([^/]+)/api/(.*)"
      - "traefik.http.middlewares.api-redirect.redirectregex.replacement=https://api.$${1}/$${2}"
      - "traefik.http.middlewares.api-redirect.redirectregex.permanent=false"

      # Strip /api prefix
      - "traefik.http.middlewares.api-strip-prefix.stripprefix.prefixes=/api"

      # CORS para redirects
      - "traefik.http.middlewares.cors-redirect.headers.accessControlAllowMethods=GET,POST,OPTIONS,PUT,DELETE,PATCH"
      - "traefik.http.middlewares.cors-redirect.headers.accessControlAllowOriginList=${CORS_ALLOW_ORIGIN_LIST:-*}"
      - "traefik.http.middlewares.cors-redirect.headers.accessControlAllowHeaders=Content-Type,Authorization,X-Requested-With,Accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers"
      - "traefik.http.middlewares.cors-redirect.headers.accessControlAllowCredentials=true"
      - "traefik.http.middlewares.cors-redirect.headers.accessControlMaxAge=3600"
      - "traefik.http.middlewares.cors-redirect.headers.accessControlExposeHeaders=Content-Length,Content-Range"
      - "traefik.http.middlewares.cors-redirect.headers.addVaryHeader=true"

      # Redirecionamento www -> non-www
      - "traefik.http.middlewares.www-to-non-www.redirectregex.regex=^https?://www\\.(.*)"
      - "traefik.http.middlewares.www-to-non-www.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.www-to-non-www.redirectregex.permanent=true"

      # Roteamento do frontend - Site principal para Netlify
      - "traefik.http.routers.qd-frontend-main.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.qd-frontend-main.entrypoints=websecure"
      - "traefik.http.routers.qd-frontend-main.tls.certresolver=leresolver"
      - "traefik.http.routers.qd-frontend-main.middlewares=security-headers,compression"
      - "traefik.http.routers.qd-frontend-main.service=qd-frontend-netlify"
      - "traefik.http.routers.qd-frontend-main.priority=1"
      - "traefik.http.services.qd-frontend-netlify.loadbalancer.server.url=${FRONTEND_UPSTREAM_URL:-https://querido-diario-plataforma.netlify.app}"

      # WWW Redirect
      - "traefik.http.routers.qd-frontend-www-redirect.rule=Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.qd-frontend-www-redirect.entrypoints=websecure"
      - "traefik.http.routers.qd-frontend-www-redirect.tls.certresolver=leresolver"
      - "traefik.http.routers.qd-frontend-www-redirect.middlewares=www-to-non-www"
      - "traefik.http.routers.qd-frontend-www-redirect.service=qd-frontend-www-noop"
      - "traefik.http.routers.qd-frontend-www-redirect.priority=10"

      # Noop service para routers de redirect
      - "traefik.http.services.qd-frontend-www-noop.loadbalancer.server.url=http://127.0.0.1:9999"
