---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - certificates.yaml
  # OpenSearch single-node dentro do cluster (ver ADR-008)
  - opensearch/statefulset.yaml

# Defina as imagens com tags fixas para produção (evite :latest)
images:
  - name: ghcr.io/okfn-brasil/querido-diario-api
    newTag: "v0.22.1"
  - name: ghcr.io/okfn-brasil/querido-diario-backend
    newTag: "latest"
  - name: ghcr.io/okfn-brasil/querido-diario-data-processing
    newTag: "latest"
  - name: ghcr.io/okfn-brasil/querido-diario-data-processing/apache-tika
    newTag: "latest"

patches:
  # ── Réplicas ───────────────────────────────────────────────────────────────
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: frontend

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: api

  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: celery-worker

  # ── PostgreSQL via CloudNativePG ───────────────────────────────────────────
  - patch: |-
      - op: replace
        path: /spec/instances
        value: 3
      - op: replace
        path: /spec/storage/size
        value: 100Gi
      - op: add
        path: /spec/storage/storageClass
        value: ceph-block-hdd
      - op: replace
        path: /spec/resources/limits/memory
        value: 1Gi
      - op: replace
        path: /spec/resources/requests/memory
        value: 800Mi
      - op: add
        path: /spec/resources/limits/cpu
        value: "500m"
      - op: add
        path: /spec/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/postgresql/parameters/shared_buffers
        value: "256MB"
    target:
      kind: Cluster
      name: postgres

  # ── StorageClass Ceph para volumes persistentes ────────────────────────────
  - patch: |-
      - op: add
        path: /spec/storageClassName
        value: ceph-block-hdd
    target:
      kind: PersistentVolumeClaim
      name: redis-data

  - patch: |-
      - op: add
        path: /spec/storageClassName
        value: ceph-block-hdd
    target:
      kind: PersistentVolumeClaim
      name: static-files

  # ── ConfigMap: domínio e URLs de produção ─────────────────────────────────
  # Domínio base: queridodiario.org.br
  # Para trocar o domínio, alterar todos os valores desta seção e os
  # IngressRoutes abaixo. Não existe variável única no Kustomize para
  # interpolação em strings — ver CLAUDE.md para alternativas (Helm).
  - patch: |-
      - op: replace
        path: /data/DOMAIN
        value: queridodiario.org.br
      - op: replace
        path: /data/QD_API_URL
        value: https://api.queridodiario.org.br
      - op: replace
        path: /data/QD_BACKEND_ALLOWED_HOSTS
        value: "queridodiario.org.br,www.queridodiario.org.br,api.queridodiario.org.br,www.api.queridodiario.org.br,backend-api.queridodiario.org.br,www.backend-api.queridodiario.org.br"
      - op: replace
        path: /data/STATIC_URL
        value: https://backend-api.queridodiario.org.br/api/static/
      - op: replace
        path: /data/FRONT_BASE_URL
        value: https://queridodiario.org.br
    target:
      kind: ConfigMap
      name: app-config

  # ── Frontend: env.js aponta para API de produção ──────────────────────────
  - patch: |-
      - op: replace
        path: /data/env.js
        value: |
          (function (window) {
            window.__env = window.__env || {};
            window.__env.envFileLoaded = true;
            window.__env.apiUrl = 'https://api.queridodiario.org.br';
            window.__env.qdApiSearchResultMaxSize = 10000;
          }(this));
    target:
      kind: ConfigMap
      name: frontend-env

  # ── IngressRoutes HTTPS ────────────────────────────────────────────────────
  # tls.secretName em vez de tls.certResolver: o Traefik do Revoada não tem
  # certresolver ACME configurado; o cert-manager cuida dos certificados.
  # Os IngressRoutes *-http da base ficam inativos: o haproxy externo já
  # redireciona HTTP→HTTPS antes de chegar ao Traefik.
  - patch: |-
      - op: replace
        path: /spec
        value:
          entryPoints:
            - websecure
          routes:
            - match: "Host(`queridodiario.org.br`)"
              kind: Rule
              priority: 10
              middlewares:
                - name: security-headers
                - name: compression
              services:
                - name: frontend
                  port: 80
            - match: "Host(`www.queridodiario.org.br`)"
              kind: Rule
              priority: 200
              middlewares:
                - name: www-to-non-www
              services:
                - name: frontend
                  port: 80
          tls:
            secretName: queridodiario-tls
    target:
      kind: IngressRoute
      name: frontend

  - patch: |-
      - op: replace
        path: /spec
        value:
          entryPoints:
            - websecure
          routes:
            - match: "Host(`api.queridodiario.org.br`)"
              kind: Rule
              priority: 10
              middlewares:
                - name: api-strip-prefix
                - name: cors-headers
                - name: api-rate-limit
                - name: security-headers
                - name: compression
              services:
                - name: api
                  port: 8080
            - match: "Host(`www.api.queridodiario.org.br`)"
              kind: Rule
              priority: 200
              middlewares:
                - name: www-to-non-www
              services:
                - name: api
                  port: 8080
            - match: "Host(`queridodiario.org.br`) && PathPrefix(`/api`)"
              kind: Rule
              priority: 100
              middlewares:
                - name: cors-redirect
                - name: api-redirect
              services:
                - name: api
                  port: 8080
          tls:
            secretName: queridodiario-tls
    target:
      kind: IngressRoute
      name: api

  - patch: |-
      - op: replace
        path: /spec
        value:
          entryPoints:
            - websecure
          routes:
            - match: "Host(`backend-api.queridodiario.org.br`)"
              kind: Rule
              middlewares:
                - name: cors-headers
                - name: api-rate-limit
                - name: security-headers
                - name: compression
              services:
                - name: backend
                  port: 8000
            - match: "Host(`www.backend-api.queridodiario.org.br`)"
              kind: Rule
              priority: 200
              middlewares:
                - name: www-to-non-www
              services:
                - name: backend
                  port: 8000
          tls:
            secretName: queridodiario-tls
    target:
      kind: IngressRoute
      name: backend

  # ── Exclui do output: namespace e templates de secrets ────────────────────────
  # O namespace já existe (gerenciado pelo admin) e os secrets são gerenciados
  # pelo CI (via kubectl create secret) ou manualmente. O kustomize não deve
  # sobrescrever esses recursos com os templates placeholder da base.
  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: querido-diario
    target:
      kind: Namespace
      name: querido-diario

  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: app-secret
    target:
      kind: Secret
      name: app-secret

  - patch: |-
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata:
        name: postgres-credentials
    target:
      kind: Secret
      name: postgres-credentials
