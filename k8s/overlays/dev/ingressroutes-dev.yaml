---
# IngressRoutes HTTP para *.queridodiario.local
# Os IngressRoutes da base usam websecure (HTTPS) e hostnames de produção.
# Em dev, o Traefik só tem o entrypoint web (porta 80), então os de produção
# são ignorados automaticamente. Estes adicionam as rotas locais.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: api-dev
  namespace: querido-diario
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`api.queridodiario.local`)
      kind: Rule
      middlewares:
        - name: cors-headers
        - name: api-rate-limit
        - name: compression
      services:
        - name: api
          port: 8080
    - match: Host(`queridodiario.local`) && PathPrefix(`/api`)
      kind: Rule
      priority: 100
      middlewares:
        - name: api-strip-prefix
        - name: cors-headers
        - name: compression
      services:
        - name: api
          port: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: backend-dev
  namespace: querido-diario
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`backend-api.queridodiario.local`)
      kind: Rule
      middlewares:
        - name: cors-headers
        - name: api-rate-limit
        - name: compression
      services:
        - name: backend
          port: 8000
