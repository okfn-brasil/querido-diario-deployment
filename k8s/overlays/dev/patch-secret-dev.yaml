---
# Patch do secret para desenvolvimento local.
# Todos os valores são placeholders sem sensibilidade — pode ser versionado.
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: querido-diario
stringData:
  QD_BACKEND_SECRET_KEY: "local-execution-django-secret-key"

  QUERIDO_DIARIO_OPENSEARCH_HOST: "http://opensearch:9200"
  QUERIDO_DIARIO_OPENSEARCH_USER: "admin"
  QUERIDO_DIARIO_OPENSEARCH_PASSWORD: "admin"

  QD_DATA_DB_HOST: "postgres"
  QD_DATA_DB_USER: "admin"
  QD_DATA_DB_PASSWORD: "admin"

  QD_BACKEND_DB_HOST: "postgres"
  QD_BACKEND_DB_USER: "admin"
  QD_BACKEND_DB_PASSWORD: "admin"
  QD_BACKEND_DB_URL: "postgres://admin:admin@postgres:5432/backend"

  POSTGRES_COMPANIES_HOST: "postgres"
  POSTGRES_COMPANIES_USER: "admin"
  POSTGRES_COMPANIES_PASSWORD: "admin"

  # Garage v2: key ID deve ser GK + 24 hex chars; secret deve ter 64 hex chars
  STORAGE_ACCESS_KEY: "GKdeadbeef000000000000dead"
  STORAGE_ACCESS_SECRET: "c0ffee000000000000000000000000000000000000000000000000000000cafe"
  STORAGE_BUCKET: "queridodiariobucket"

  MAILJET_API_KEY: ""
  MAILJET_SECRET_KEY: ""
  QUERIDO_DIARIO_SUGGESTION_RECIPIENT_EMAIL: "dev@queridodiario.local"
