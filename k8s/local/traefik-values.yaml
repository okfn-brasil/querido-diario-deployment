---
# Traefik para ambiente local kind
# DaemonSet com hostPort para que o pod use a porta 80 do nó kind,
# que é mapeada para localhost:80 via extraPortMappings do cluster.

deployment:
  kind: DaemonSet

ports:
  web:
    port: 8000          # porta interna do container Traefik
    hostPort: 80        # mapeia para a porta 80 do nó kind
    expose:
      default: true
    exposedPort: 80
  websecure:
    expose:
      default: false    # não expõe HTTPS em dev

service:
  type: ClusterIP

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: false

# Desabilita Gateway API — usamos apenas IngressRoute (CRD nativo do Traefik).
# Os CRDs do Gateway API v1.1 usam isIP() em CEL, que requer k8s >= 1.31.
gateway:
  enabled: false

gatewayClass:
  enabled: false
