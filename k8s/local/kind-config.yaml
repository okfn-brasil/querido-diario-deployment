---
# Cluster kind para desenvolvimento local do Querido Diário
# Mapeia host:80 → kind-node:80 para o Traefik (web entrypoint via hostPort)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: querido-diario-dev
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
