---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: querido-diario
data:
  # Domain
  DOMAIN: "queridodiario.ok.org.br"

  # API
  API_LOG_LEVEL: "INFO"
  GUNICORN_WORKERS: "4"
  GUNICORN_WORKER_CLASS: "sync"
  QUERIDO_DIARIO_OPENSEARCH_INDEX: "queridodiario"
  GAZETTE_OPENSEARCH_INDEX: "queridodiario"
  # Precisam bater com os bancos criados pelo bootstrap do CNPG
  # (k8s/base/postgres/cluster.yaml: queridodiario/backend/companies).
  # POSTGRES_AGGREGATES_* aponta pro mesmo banco/credenciais de POSTGRES_* —
  # os agregados vivem no banco principal (ver aggregates_pipeline() no
  # repo data-processing), não em um banco "aggregates" separado.
  POSTGRES_COMPANIES_DB: "companies"
  POSTGRES_AGGREGATES_DB: "queridodiario"
  POSTGRES_COMPANIES_PORT: "5432"
  POSTGRES_AGGREGATES_PORT: "5432"
  QUERIDO_DIARIO_FILES_ENDPOINT: ""
  REPLACE_FILE_URL_BASE: "False"
  CITY_DATABASE_CSV: "censo.csv"
  THEMES_DATABASE_JSON: "themes_config.json"
  QUERIDO_DIARIO_SUGGESTION_RECIPIENT_NAME: "Contato Querido Diário"
  QUERIDO_DIARIO_SUGGESTION_SENDER_NAME: "Contato Querido Diário"
  GAZETTE_CONTENT_EXACT_FIELD_SUFFIX: ".exact"
  GAZETTE_CONTENT_FIELD: "source_text"
  GAZETTE_PUBLICATION_DATE_FIELD: "date"
  GAZETTE_SCRAPED_AT_FIELD: "scraped_at"
  GAZETTE_TERRITORY_ID_FIELD: "territory_id"
  THEMED_EXCERPT_CONTENT_EXACT_FIELD_SUFFIX: ".exact"
  THEMED_EXCERPT_CONTENT_FIELD: "excerpt"
  THEMED_EXCERPT_EMBEDDING_SCORE_FIELD: "excerpt_embedding_score"
  THEMED_EXCERPT_ENTITIES_FIELD: "excerpt_entities"
  THEMED_EXCERPT_FRAGMENT_SIZE: "10000"
  THEMED_EXCERPT_NUMBER_OF_FRAGMENTS: "1"
  THEMED_EXCERPT_PUBLICATION_DATE_FIELD: "source_date"
  THEMED_EXCERPT_SCRAPED_AT_FIELD: "source_scraped_at"
  THEMED_EXCERPT_SUBTHEMES_FIELD: "excerpt_subthemes"
  THEMED_EXCERPT_TERRITORY_ID_FIELD: "source_territory_id"
  THEMED_EXCERPT_TFIDF_SCORE_FIELD: "excerpt_tfidf_score"
  QUERIDO_DIARIO_CORS_ALLOW_CREDENTIALS: "True"
  QUERIDO_DIARIO_CORS_ALLOW_HEADERS: "*"
  QUERIDO_DIARIO_CORS_ALLOW_METHODS: "*"
  QUERIDO_DIARIO_CORS_ALLOW_ORIGINS: "*"
  QUERIDO_DIARIO_API_ROOT_PATH: ""

  # Backend / Celery
  QD_BACKEND_DEBUG: "False"
  DJANGO_SETTINGS_MODULE: "config.settings"
  QD_BACKEND_ALLOWED_HOSTS: "backend-api.queridodiario.ok.org.br,api.queridodiario.ok.org.br,queridodiario.ok.org.br"
  QD_BACKEND_ALLOWED_ORIGINS: "*"
  QD_BACKEND_ALLOWED_ORIGIN_REGEXES: ""
  QD_BACKEND_CSRF_TRUSTED_ORIGINS: "*"
  QD_API_THEME: "Tecnologias%20na%20Educação"
  QD_API_URL: "https://api.queridodiario.ok.org.br"
  CELERY_BROKER_URL: "redis://redis:6378"
  CELERY_RESULT_BACKEND: "redis://redis:6378"
  CELERY_MAX_TASKS_PER_CHILD: "100"
  CELERY_WORKER_PREFETCH_MULTIPLIER: "1"
  STATIC_URL: "https://backend-api.queridodiario.ok.org.br/api/static/"
  FRONT_BASE_URL: "https://queridodiario.ok.org.br"
  PROJECT_TITLE: "Querido Diário"
  ALERT_HOUR: "8"
  ALERT_MINUTE: "0"
  DEFAULT_FROM_EMAIL: ""
  SERVER_EMAIL: ""
  QUOTATION_TO_EMAIL: ""

  # Data Processing
  PYTHONUNBUFFERED: "1"
  MALLOC_ARENA_MAX: "2"
  PYTHONMALLOC: "malloc"
  PYTHON_GC_THRESHOLD: "700,10,5"
  APACHE_TIKA_SERVER: "http://apache-tika:9998"
  STORAGE_REGION: "us-east-1"
  STORAGE_ENDPOINT: ""
  EXECUTION_MODE: "UNPROCESSED"
  # Banco criado pelo bootstrap do CNPG (k8s/base/postgres/cluster.yaml).
  POSTGRES_DB: "queridodiario"
  POSTGRES_PORT: "5432"
  OPENSEARCH_INDEX: "queridodiario"

  # Tika JVM
  JAVA_TOOL_OPTIONS: >-
    -Xmx1400m
    -Xms256m
    -XX:+UseG1GC
    -XX:MaxGCPauseMillis=200
    -XX:MaxMetaspaceSize=256m
    -XX:+UseContainerSupport
    -XX:MaxRAMPercentage=56.0
