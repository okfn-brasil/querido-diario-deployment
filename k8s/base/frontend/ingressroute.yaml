---
# queridodiario.ok.org.br → frontend (HTTPS)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend
  namespace: querido-diario
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`queridodiario.ok.org.br`)
      kind: Rule
      priority: 10
      middlewares:
        - name: security-headers
        - name: compression
      services:
        - name: frontend
          port: 80
    - match: Host(`www.queridodiario.ok.org.br`)
      kind: Rule
      priority: 200
      middlewares:
        - name: www-to-non-www
      services:
        - name: frontend
          port: 80
  tls:
    certResolver: leresolver
---
# HTTP → HTTPS redirect para queridodiario.ok.org.br
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend-http
  namespace: querido-diario
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`queridodiario.ok.org.br`) || Host(`www.queridodiario.ok.org.br`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
      services:
        - name: frontend
          port: 80
