---
# TEMPLATE — preencha e NÃO versione com valores reais.
# O CloudNativePG usa este secret para criar o usuário dono dos bancos durante o initdb.
# Após a criação do cluster, o CNPG gera automaticamente o secret "postgres-app"
# com a connection string completa (uri, host, port, dbname, user, password).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: querido-diario
stringData:
  username: "<CHANGE_ME>"
  password: "<CHANGE_ME>"
