---
# TEMPLATE — preencha com valores reais e NÃO versione este arquivo com dados reais.
# Para criar o Secret no cluster:
#
#   kubectl create secret generic app-secret \
#     --namespace querido-diario \
#     --from-literal=QD_BACKEND_SECRET_KEY='<valor>' \
#     --from-literal=QUERIDO_DIARIO_OPENSEARCH_HOST='<valor>' \
#     ... (demais chaves abaixo)
#
# Ou use este arquivo como template (substitua os placeholders) e aplique via:
#   kubectl apply -f secret-app.yaml
#
# Para ambientes gerenciados, prefira External Secrets Operator ou Sealed Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: querido-diario
type: Opaque
stringData:
  # Backend
  QD_BACKEND_SECRET_KEY: "<CHANGE_ME>"

  # OpenSearch
  QUERIDO_DIARIO_OPENSEARCH_HOST: "<CHANGE_ME>"
  QUERIDO_DIARIO_OPENSEARCH_USER: "<CHANGE_ME>"
  QUERIDO_DIARIO_OPENSEARCH_PASSWORD: "<CHANGE_ME>"

  # DB - API + Data Processing
  QD_DATA_DB_HOST: "<CHANGE_ME>"
  QD_DATA_DB_USER: "<CHANGE_ME>"
  QD_DATA_DB_PASSWORD: "<CHANGE_ME>"

  # DB - Backend + Celery (use a URL completa OU os campos individuais)
  QD_BACKEND_DB_HOST: "<CHANGE_ME>"
  QD_BACKEND_DB_USER: "<CHANGE_ME>"
  QD_BACKEND_DB_PASSWORD: "<CHANGE_ME>"
  # QD_BACKEND_DB_URL gerado a partir dos campos acima:
  # postgres://<USER>:<PASSWORD>@<HOST>:5432/queridodiariobackend
  QD_BACKEND_DB_URL: "<CHANGE_ME>"

  # DB - Companies
  POSTGRES_COMPANIES_HOST: "<CHANGE_ME>"
  POSTGRES_COMPANIES_USER: "<CHANGE_ME>"
  POSTGRES_COMPANIES_PASSWORD: "<CHANGE_ME>"

  # Storage (S3 ou compatível)
  STORAGE_ACCESS_KEY: "<CHANGE_ME>"
  STORAGE_ACCESS_SECRET: "<CHANGE_ME>"
  STORAGE_BUCKET: "<CHANGE_ME>"

  # Email
  MAILJET_API_KEY: "<CHANGE_ME>"
  MAILJET_SECRET_KEY: "<CHANGE_ME>"
  QUERIDO_DIARIO_SUGGESTION_RECIPIENT_EMAIL: "<CHANGE_ME>"
