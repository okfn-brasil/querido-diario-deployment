---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: querido-diario
spec:
  # Celery beat deve ter exatamente 1 réplica para evitar tarefas duplicadas
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: ghcr.io/okfn-brasil/querido-diario-backend:latest
          command:
            - celery
            - -A
            - config
            - beat
            - -l
            - INFO
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: QD_BACKEND_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: QD_BACKEND_SECRET_KEY
            - name: QD_BACKEND_DB_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: QD_BACKEND_DB_URL
            - name: MAILJET_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: MAILJET_API_KEY
            - name: MAILJET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: MAILJET_SECRET_KEY
          resources:
            limits:
              memory: 256Mi
            requests:
              memory: 128Mi
