---
# CronJob equivalente ao serviço data-processing com restart: "no" no compose.
# Por padrão roda a cada hora; ajuste .spec.schedule conforme necessidade.
# Execução manual: kubectl create job --from=cronjob/data-processing data-processing-manual -n querido-diario
apiVersion: batch/v1
kind: CronJob
metadata:
  name: data-processing
  namespace: querido-diario
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: data-processing
              image: ghcr.io/okfn-brasil/querido-diario-data-processing:latest
              command:
                - python
                - main
              envFrom:
                - configMapRef:
                    name: app-config
              env:
                - name: QUERIDO_DIARIO_OPENSEARCH_HOST
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: QUERIDO_DIARIO_OPENSEARCH_HOST
                - name: QUERIDO_DIARIO_OPENSEARCH_USER
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: QUERIDO_DIARIO_OPENSEARCH_USER
                - name: QUERIDO_DIARIO_OPENSEARCH_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: QUERIDO_DIARIO_OPENSEARCH_PASSWORD
                - name: POSTGRES_HOST
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: QD_DATA_DB_HOST
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: QD_DATA_DB_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: QD_DATA_DB_PASSWORD
                - name: STORAGE_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: STORAGE_ACCESS_KEY
                - name: STORAGE_ACCESS_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: STORAGE_ACCESS_SECRET
                - name: STORAGE_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: STORAGE_BUCKET
                - name: OPENSEARCH_HOST
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: QUERIDO_DIARIO_OPENSEARCH_HOST
                - name: OPENSEARCH_USER
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: QUERIDO_DIARIO_OPENSEARCH_USER
                - name: OPENSEARCH_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: app-secret
                      key: QUERIDO_DIARIO_OPENSEARCH_PASSWORD
                # Reflete o limits.memory abaixo pro processo — main/__main__.py
                # (repo querido-diario-data-processing) usa isso pra calcular
                # o RLIMIT_AS (soft/hard) dinamicamente via Downward API, em
                # vez de um valor hardcoded que fica dessincronizado quando
                # o limite muda aqui.
                - name: MEMORY_LIMIT_BYTES
                  valueFrom:
                    resourceFieldRef:
                      containerName: data-processing
                      resource: limits.memory
              resources:
                # 6Gi: import de sentence-transformers/transformers/torch (pra
                # reranking de excertos via embeddings) sozinho já passa de
                # 2Gi antes de qualquer inferência, mesmo sem carregar lotes
                # grandes de excertos.
                limits:
                  memory: 6Gi
                requests:
                  memory: 1Gi
